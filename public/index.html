<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MP Proposal Tracker · Medical Pharma BD</title>

  <!-- Pre-paint theme: read saved pref before first render to avoid flash -->
  <script>
    (function () {
      var s = localStorage.getItem('mp-theme');
      var p = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
      document.documentElement.setAttribute('data-theme', s || p);
    })();
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css">
</head>
<body>

<!-- ── Auth overlay ─────────────────────────────────── -->
<div id="auth-overlay">
  <div class="auth-card">
    <div class="auth-mark">MP</div>
    <h1 class="auth-title">Proposal Tracker</h1>
    <p class="auth-sub">Medical Pharma BD · FY 2026-27</p>
    <label class="auth-label" for="pw">Access password</label>
    <input id="pw" class="auth-input" type="password" placeholder="Enter password" autocomplete="current-password">
    <button id="login-btn" class="btn btn--primary auth-btn">Access dashboard →</button>
    <p id="auth-err" class="auth-err"></p>
  </div>
</div>

<!-- ── Main app ──────────────────────────────────────── -->
<div id="main-app" class="app" style="display:none">

  <!-- TopBar -->
  <header class="topbar">
    <div class="topbar__brand">
      <span class="brand-mark">MP</span>
      <span class="brand-name">Proposal Tracker</span>
      <span class="brand-sub">/ Medical Pharma BD</span>
    </div>
    <div class="topbar__actions">
      <span class="sync-pill" id="sync-pill" title="">
        <span class="sync-dot"></span>
        <span id="sync-label">Never synced</span>
      </span>
      <a class="btn btn--ghost" href="https://docs.google.com/spreadsheets/d/1LqPp8lbv13kXGfZJZnRWrO_AZmV5iwlGk66JgqcSNm8/edit" target="_blank" rel="noopener">↗ Open sheet</a>
      <button class="btn btn--primary" id="sync-btn">↻ Sync</button>
      <button class="theme-toggle" id="theme-toggle" aria-label="Toggle theme">
        <svg id="theme-icon" width="14" height="14" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></svg>
      </button>
      <div class="date-block" id="date-block">
        <span class="date-block__day">—</span>
        <span class="date-block__sub">—</span>
      </div>
    </div>
  </header>

  <!-- Tabs -->
  <nav class="tabs" id="tabs">
    <button class="tab is-active" data-tab="overview">Overview</button>
    <button class="tab" data-tab="pipeline">Pipeline <span class="tab__count" id="tc-pipeline">—</span></button>
    <button class="tab" data-tab="kanban">Kanban</button>
    <button class="tab" data-tab="requested">Requested <span class="tab__count" id="tc-requested">—</span></button>
    <button class="tab" data-tab="won">Won <span class="tab__count" id="tc-won">—</span></button>
    <button class="tab" data-tab="data">Data <span class="tab__count" id="tc-data">—</span></button>
  </nav>

  <!-- Filter bar -->
  <div class="filterbar" id="filterbar">
    <div class="search">
      <svg class="search__icon" width="14" height="14" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input id="search-input" type="search" placeholder="Search company, deal, contact…">
      <span class="kbd">⌘K</span>
    </div>
    <div class="chip-group" id="type-chips">
      <button class="chip is-active" data-type="all">All</button>
      <button class="chip chip--hot"  data-type="hot"><span class="chip__dot"></span>Hot</button>
      <button class="chip chip--warm" data-type="warm"><span class="chip__dot"></span>Warm</button>
      <button class="chip chip--cold" data-type="cold"><span class="chip__dot"></span>Cold</button>
    </div>
    <div class="filterbar__sep"></div>
    <!-- Period chips are generated dynamically (one per month with deals) in app.js -->
    <div class="chip-group" id="period-chips">
      <button class="chip is-active" data-period="all">All periods</button>
    </div>
    <div class="filterbar__spacer"></div>
    <span class="results" id="results-count">— proposals</span>
  </div>

  <!-- Main content -->
  <main class="main" id="main">
    <div class="empty">Loading proposals…</div>
  </main>

</div>

<!-- Tooltip -->
<div class="tooltip" id="tooltip" style="display:none">
  <div class="tooltip__title" id="tt-title"></div>
  <div class="tooltip__row"><span>Value</span><strong id="tt-value"></strong></div>
  <div class="tooltip__row"><span>Status</span><strong id="tt-status"></strong></div>
  <div class="tooltip__row"><span>Contact</span><strong id="tt-contact"></strong></div>
</div>

<script src="/app.js"></script>
</body>
</html>
